server:
  servlet:
    context-path: /household-errands-service

spring:
  banner:
    location: banner.txt
  datasource:
    url: jdbc:h2:mem:household-db
    driver-class-name: org.h2.Driver
    username: household
    password: household
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console/

springdoc:
  show-actuator: true

swagger:
  application:
    description: "Application to serve the needs for household errands"
    version: "1.0.0-SNAPSHOT"

jwt:
  secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
  expiration-ms: 3600000
